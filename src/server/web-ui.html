<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>memento-mcp inspector</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #e0e0e0;
    --accent: #0366d6;
    --accent-bg: #f1f8ff;
    --code-bg: #f6f8fa;
    --row-hover: #f6f8fa;
    --pin: #d29922;
    --danger: #d73a49;
    --badge-bg: #eee;
    --badge-fg: #333;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-bg: #161e2c;
      --code-bg: #161b22;
      --row-hover: #161b22;
      --pin: #d29922;
      --danger: #f85149;
      --badge-bg: #21262d;
      --badge-fg: #c9d1d9;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .mode {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--badge-bg);
    color: var(--badge-fg);
  }
  header .mode.edit { background: #fff3cd; color: #856404; }
  @media (prefers-color-scheme: dark) {
    header .mode.edit { background: #3a2e0a; color: #f0c674; }
  }
  nav {
    display: flex;
    gap: 4px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
  }
  nav button {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
  }
  nav button:hover { color: var(--fg); }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  main { padding: 16px 20px; }
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  input[type="text"], select {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
  }
  input[type="text"] { min-width: 240px; }
  button.btn {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  button.btn:hover { background: var(--row-hover); }
  button.btn:disabled { opacity: 0.5; cursor: not-allowed; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th { font-weight: 600; color: var(--muted); }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.selected { background: var(--accent-bg); }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 8px;
    background: var(--badge-bg);
    color: var(--badge-fg);
  }
  .badge.pinned { background: var(--pin); color: #000; }
  .badge.summary { background: var(--accent); color: #fff; }
  .badge.team { background: #2ea44f; color: #fff; }
  .pagination {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 12px;
    color: var(--muted);
  }
  .panel {
    position: fixed;
    top: 0;
    right: 0;
    width: min(560px, 90vw);
    height: 100%;
    background: var(--bg);
    border-left: 1px solid var(--border);
    box-shadow: -2px 0 12px rgba(0,0,0,0.1);
    overflow-y: auto;
    padding: 20px;
    transform: translateX(100%);
    transition: transform 0.18s ease-out;
    z-index: 100;
  }
  .panel.open { transform: translateX(0); }
  .panel h2 { margin: 0 0 12px; font-size: 16px; }
  .panel pre {
    background: var(--code-bg);
    padding: 10px;
    border-radius: 4px;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
    max-height: 320px;
    overflow-y: auto;
  }
  .panel .meta { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .panel .actions { display: flex; gap: 8px; margin-bottom: 16px; }
  .panel .section { margin-top: 16px; }
  .panel .section h3 { font-size: 13px; margin: 0 0 6px; color: var(--muted); }
  .panel ul { padding-left: 20px; margin: 4px 0; }
  .panel button.close {
    position: absolute;
    top: 16px;
    right: 16px;
  }
  .empty { color: var(--muted); padding: 24px; text-align: center; }
  .progress { color: var(--muted); padding: 8px 0; }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }
  .summary-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }
  .summary-card .label { color: var(--muted); font-size: 12px; }
  .summary-card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .footer-note { color: var(--muted); font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
<header>
  <h1>memento-mcp inspector</h1>
  <span id="mode-badge" class="mode">read-only</span>
  <span style="flex:1"></span>
  <span id="version" class="meta" style="color:var(--muted);font-size:12px"></span>
</header>
<nav>
  <button data-tab="memories" class="active">Memories</button>
  <button data-tab="decisions">Decisions</button>
  <button data-tab="pitfalls">Pitfalls</button>
  <button data-tab="sessions">Sessions</button>
  <button data-tab="projects">Projects</button>
  <button data-tab="analytics">Analytics</button>
  <button data-tab="sync">Sync</button>
</nav>
<main id="main"></main>
<div id="panel" class="panel" aria-hidden="true">
  <button class="btn close" onclick="closePanel()">Close</button>
  <div id="panel-body"></div>
</div>
<script>
"use strict";
let enableEdit = false;
let activeTab = "memories";
let state = {
  memories: { offset: 0, limit: 50, total: 0, query: "", type: "", pinned: "" },
  decisions: { offset: 0, limit: 50, total: 0 },
  pitfalls: { offset: 0, limit: 50, total: 0 },
  sessions: { offset: 0, limit: 20, total: 0 },
  projects: { offset: 0, limit: 50, total: 0 },
  analytics: { days: 7 },
  sync: { project: "" },
};

async function api(path, opts) {
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function init() {
  try {
    const h = await api("/api/health");
    enableEdit = !!h.enableEdit;
    document.getElementById("version").textContent = "v" + h.version;
    const badge = document.getElementById("mode-badge");
    if (enableEdit) {
      badge.textContent = "edit enabled";
      badge.classList.add("edit");
    }
  } catch (e) {
    document.getElementById("main").innerHTML = '<div class="empty">Failed to reach API: ' + escapeHtml(e.message) + '</div>';
    return;
  }
  document.querySelectorAll("nav button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll("nav button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      activeTab = b.dataset.tab;
      render();
    });
  });
  render();
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function fmtDate(s) {
  if (!s) return "—";
  return s.replace("T", " ").replace(/\..*$/, "");
}

function render() {
  if (activeTab === "memories") return renderMemories();
  if (activeTab === "decisions") return renderDecisions();
  if (activeTab === "pitfalls") return renderPitfalls();
  if (activeTab === "sessions") return renderSessions();
  if (activeTab === "projects") return renderProjects();
  if (activeTab === "analytics") return renderAnalytics();
}

async function renderMemories() {
  const main = document.getElementById("main");
  const s = state.memories;
  main.innerHTML = `
    <div class="toolbar">
      <input type="text" id="q" placeholder="Search memories…" value="${escapeHtml(s.query)}" />
      <select id="type">
        <option value="">all types</option>
        <option value="fact">fact</option>
        <option value="decision">decision</option>
        <option value="preference">preference</option>
        <option value="pattern">pattern</option>
        <option value="architecture">architecture</option>
        <option value="pitfall">pitfall</option>
        <option value="session_summary">session_summary</option>
      </select>
      <select id="pinned">
        <option value="">pinned + unpinned</option>
        <option value="1">pinned only</option>
        <option value="0">unpinned only</option>
      </select>
      <button class="btn" id="apply">Apply</button>
    </div>
    <div id="list" class="progress">Loading…</div>
    <div class="pagination" id="pag"></div>
  `;
  document.getElementById("type").value = s.type;
  document.getElementById("pinned").value = s.pinned;
  document.getElementById("apply").onclick = () => {
    s.query = document.getElementById("q").value;
    s.type = document.getElementById("type").value;
    s.pinned = document.getElementById("pinned").value;
    s.offset = 0;
    renderMemories();
  };
  document.getElementById("q").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("apply").click(); });

  const params = new URLSearchParams({ limit: String(s.limit), offset: String(s.offset) });
  if (s.query) params.set("q", s.query);
  if (s.type) params.set("type", s.type);
  if (s.pinned) params.set("pinned", s.pinned);

  try {
    const data = await api("/api/memories?" + params.toString());
    s.total = data.total;
    if (data.items.length === 0) {
      document.getElementById("list").innerHTML = '<div class="empty">No memories.</div>';
    } else {
      const rows = data.items.map(m => `
        <tr data-id="${escapeHtml(m.id)}">
          <td>${m.is_pinned ? '<span class="badge pinned">pin</span>' : ""}${m.memory_type === "session_summary" ? '<span class="badge summary">summary</span>' : ""}</td>
          <td><strong>${escapeHtml(m.title)}</strong><br><span class="meta" style="color:var(--muted);font-size:12px">${escapeHtml(m.memory_type)} · ${escapeHtml(m.scope || "")}</span></td>
          <td>${(m.importance_score || 0).toFixed(2)}</td>
          <td>${fmtDate(m.updated_at)}</td>
        </tr>
      `).join("");
      document.getElementById("list").innerHTML = `<table><thead><tr><th></th><th>Title</th><th>Importance</th><th>Updated</th></tr></thead><tbody>${rows}</tbody></table>`;
      document.querySelectorAll("#list tbody tr").forEach(tr => tr.onclick = () => openMemory(tr.dataset.id));
    }
    renderPagination("memories");
  } catch (e) {
    document.getElementById("list").innerHTML = '<div class="empty">Error: ' + escapeHtml(e.message) + '</div>';
  }
}

function renderPagination(tab) {
  const s = state[tab];
  const pag = document.getElementById("pag");
  if (!pag) return;
  const page = Math.floor(s.offset / s.limit) + 1;
  const totalPages = Math.max(1, Math.ceil(s.total / s.limit));
  pag.innerHTML = `
    <button class="btn" ${s.offset === 0 ? "disabled" : ""} id="prev">← Prev</button>
    <span>Page ${page} of ${totalPages} · ${s.total} total</span>
    <button class="btn" ${s.offset + s.limit >= s.total ? "disabled" : ""} id="next">Next →</button>
  `;
  document.getElementById("prev").onclick = () => { s.offset = Math.max(0, s.offset - s.limit); render(); };
  document.getElementById("next").onclick = () => { s.offset += s.limit; render(); };
}

async function openMemory(id) {
  const panel = document.getElementById("panel");
  const body = document.getElementById("panel-body");
  body.innerHTML = '<div class="progress">Loading…</div>';
  panel.classList.add("open");
  try {
    const m = await api("/api/memories/" + encodeURIComponent(id));
    body.innerHTML = `
      <h2>${escapeHtml(m.title)}</h2>
      <div class="meta">
        <span class="badge">${escapeHtml(m.memory_type)}</span>
        ${m.is_pinned ? '<span class="badge pinned">pinned</span>' : ""}
        · scope: ${escapeHtml(m.scope || "")}
        · importance: ${(m.importance_score || 0).toFixed(2)}
        · created: ${fmtDate(m.created_at)}
      </div>
      <div class="actions">
        <button class="btn" id="pin-btn" ${enableEdit ? "" : 'disabled title="start with --enable-edit to enable"'}>${m.is_pinned ? "Unpin" : "Pin"}</button>
        <button class="btn" id="del-btn" ${enableEdit ? "" : 'disabled title="start with --enable-edit to enable"'} style="color:var(--danger)">Delete</button>
      </div>
      <pre>${escapeHtml(m.body || "")}</pre>
      ${m.linked_decisions && m.linked_decisions.length > 0 ? `<div class="section"><h3>Linked decisions (${m.linked_decisions.length})</h3><ul>${m.linked_decisions.map(d => `<li>${escapeHtml(d.title)} <span class="meta">[${escapeHtml(d.category)}]</span></li>`).join("")}</ul></div>` : ""}
      ${m.linked_pitfalls && m.linked_pitfalls.length > 0 ? `<div class="section"><h3>Active pitfalls (${m.linked_pitfalls.length})</h3><ul>${m.linked_pitfalls.map(p => `<li>${escapeHtml(p.title)} <span class="meta">×${p.occurrence_count}</span></li>`).join("")}</ul></div>` : ""}
      ${m.neighbors && m.neighbors.length > 0 ? `<div class="section"><h3>Neighbors (${m.neighbors.length})</h3><ul>${m.neighbors.map(n => `<li><a href="#" data-nid="${escapeHtml(n.id)}">${escapeHtml(n.title)}</a> <span class="meta">${escapeHtml(n.memory_type)} · ${fmtDate(n.created_at)}</span></li>`).join("")}</ul></div>` : ""}
    `;
    body.querySelectorAll("[data-nid]").forEach(a => a.onclick = e => { e.preventDefault(); openMemory(a.dataset.nid); });
    if (enableEdit) {
      document.getElementById("pin-btn").onclick = async () => {
        try {
          await api("/api/memories/" + encodeURIComponent(id) + "/pin", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-Memento-UI": "1" },
            body: JSON.stringify({ pinned: !m.is_pinned }),
          });
          openMemory(id);
          render();
        } catch (e) { alert("Pin failed: " + e.message); }
      };
      document.getElementById("del-btn").onclick = async () => {
        if (!confirm("Soft-delete this memory?")) return;
        try {
          await api("/api/memories/" + encodeURIComponent(id), {
            method: "DELETE",
            headers: { "Content-Type": "application/json", "X-Memento-UI": "1" },
          });
          closePanel();
          render();
        } catch (e) { alert("Delete failed: " + e.message); }
      };
    }
  } catch (e) {
    body.innerHTML = '<div class="empty">Error: ' + escapeHtml(e.message) + '</div>';
  }
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
}

async function renderDecisions() {
  const main = document.getElementById("main");
  const s = state.decisions;
  main.innerHTML = '<div id="list" class="progress">Loading…</div><div class="pagination" id="pag"></div>';
  try {
    const data = await api(`/api/decisions?limit=${s.limit}&offset=${s.offset}`);
    s.total = data.total;
    if (data.items.length === 0) { document.getElementById("list").innerHTML = '<div class="empty">No decisions.</div>'; return; }
    const rows = data.items.map(d => `
      <tr><td><strong>${escapeHtml(d.title)}</strong><br><span class="meta" style="color:var(--muted);font-size:12px">${escapeHtml(d.body || "").slice(0, 200)}</span></td>
      <td><span class="badge">${escapeHtml(d.category)}</span></td>
      <td>${(d.importance_score || 0).toFixed(2)}</td>
      <td>${fmtDate(d.created_at)}</td></tr>
    `).join("");
    document.getElementById("list").innerHTML = `<table><thead><tr><th>Title</th><th>Category</th><th>Importance</th><th>Created</th></tr></thead><tbody>${rows}</tbody></table>`;
    renderPagination("decisions");
  } catch (e) { document.getElementById("list").innerHTML = '<div class="empty">Error: ' + escapeHtml(e.message) + '</div>'; }
}

async function renderPitfalls() {
  const main = document.getElementById("main");
  const s = state.pitfalls;
  main.innerHTML = '<div id="list" class="progress">Loading…</div><div class="pagination" id="pag"></div>';
  try {
    const data = await api(`/api/pitfalls?limit=${s.limit}&offset=${s.offset}`);
    s.total = data.total;
    if (data.items.length === 0) { document.getElementById("list").innerHTML = '<div class="empty">No pitfalls.</div>'; return; }
    const rows = data.items.map(p => `
      <tr><td><strong>${escapeHtml(p.title)}</strong><br><span class="meta" style="color:var(--muted);font-size:12px">${escapeHtml(p.body || "").slice(0, 200)}</span></td>
      <td>×${p.occurrence_count}</td>
      <td>${(p.importance_score || 0).toFixed(2)}</td>
      <td>${fmtDate(p.last_seen_at)}</td></tr>
    `).join("");
    document.getElementById("list").innerHTML = `<table><thead><tr><th>Title</th><th>Occurrences</th><th>Importance</th><th>Last seen</th></tr></thead><tbody>${rows}</tbody></table>`;
    renderPagination("pitfalls");
  } catch (e) { document.getElementById("list").innerHTML = '<div class="empty">Error: ' + escapeHtml(e.message) + '</div>'; }
}

async function renderSessions() {
  const main = document.getElementById("main");
  const s = state.sessions;
  main.innerHTML = '<div id="list" class="progress">Loading…</div><div class="pagination" id="pag"></div>';
  try {
    const data = await api(`/api/sessions?limit=${s.limit}&offset=${s.offset}`);
    s.total = data.total;
    if (data.items.length === 0) { document.getElementById("list").innerHTML = '<div class="empty">No sessions.</div>'; return; }
    const rows = data.items.map(r => {
      const pct = r.budget > 0 ? Math.min(100, Math.round(100 * r.spent / r.budget)) : 0;
      return `<tr><td>${escapeHtml(r.id)}</td>
        <td>${escapeHtml(r.claude_session_id || "")}</td>
        <td>${r.spent} / ${r.budget} (${pct}%)</td>
        <td>${fmtDate(r.last_active)}</td>
        <td>${r.summary_memory_id ? `<a href="#" data-mid="${escapeHtml(r.summary_memory_id)}">view summary</a>` : "—"}</td></tr>`;
    }).join("");
    document.getElementById("list").innerHTML = `<table><thead><tr><th>Session</th><th>Claude session</th><th>Budget</th><th>Last active</th><th>Summary</th></tr></thead><tbody>${rows}</tbody></table>`;
    document.querySelectorAll("#list a[data-mid]").forEach(a => a.onclick = e => { e.preventDefault(); openMemory(a.dataset.mid); });
    renderPagination("sessions");
  } catch (e) { document.getElementById("list").innerHTML = '<div class="empty">Error: ' + escapeHtml(e.message) + '</div>'; }
}

async function renderProjects() {
  const main = document.getElementById("main");
  main.innerHTML = '<div id="list" class="progress">Loading…</div>';
  try {
    const data = await api("/api/projects");
    if (!data || data.length === 0) {
      document.getElementById("list").innerHTML = '<div class="empty">No projects.</div>';
      return;
    }
    const rows = data.map(p => `
      <tr>
        <td><strong>${escapeHtml(p.name)}</strong>
          ${p.has_policy ? '<span class="badge" title="Has .memento/policy.toml (schema v' + escapeHtml(String(p.schema_version ?? 1)) + ')">policy</span>' : ''}
        </td>
        <td style="color:var(--muted);font-size:12px">${escapeHtml(p.root_path || "")}</td>
        <td>${p.memory_count}</td>
        <td>${fmtDate(p.created_at)}</td>
      </tr>
    `).join("");
    document.getElementById("list").innerHTML = `<table><thead><tr><th>Name</th><th>Path</th><th>Memories</th><th>Created</th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch (e) {
    document.getElementById("list").innerHTML = '<div class="empty">Error: ' + escapeHtml(e.message) + '</div>';
  }
}

async function renderAnalytics() {
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="toolbar">
      <label>Window: <select id="days"><option value="1">last 24h</option><option value="7" selected>last 7 days</option><option value="30">last 30 days</option></select></label>
    </div>
    <div id="cards" class="progress">Loading…</div>
  `;
  document.getElementById("days").value = String(state.analytics.days);
  document.getElementById("days").onchange = e => { state.analytics.days = Number(e.target.value); renderAnalytics(); };
  try {
    const data = await api("/api/analytics/summary?days=" + state.analytics.days);
    const cards = [
      ["Memories active", data.memories?.active ?? 0],
      ["Memories deleted", data.memories?.deleted ?? 0],
      ["Sessions in window", data.injections?.session_count ?? 0],
      ["Injections", data.injections?.total ?? 0],
      ["Auto-captures", data.captures?.captured ?? 0],
      ["Capture skips", data.captures?.skipped ?? 0],
      ["Compression runs", data.compression?.runs ?? 0],
      ["Tokens saved", data.compression?.tokens_saved ?? 0],
    ];
    document.getElementById("cards").innerHTML = `
      <div class="summary-grid">
        ${cards.map(([l, v]) => `<div class="summary-card"><div class="label">${escapeHtml(l)}</div><div class="value">${escapeHtml(String(v))}</div></div>`).join("")}
      </div>
      <div class="footer-note">Window: last ${data.days} day(s). For per-event detail, query <code>/api/analytics/events</code>.</div>
    `;
  } catch (e) { document.getElementById("cards").innerHTML = '<div class="empty">Error: ' + escapeHtml(e.message) + '</div>'; }
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
